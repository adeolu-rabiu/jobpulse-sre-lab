apiVersion: apps/v1
kind: Deployment
metadata:
  name: jobpulse-api
  namespace: jobpulse
spec:
  replicas: 2
  selector:
    matchLabels:
      app: jobpulse-api
  template:
    metadata:
      labels:
        app: jobpulse-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: api
        image: jobpulse-api:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 5000
        env:
        - name: DB_HOST
          value: mysql-svc
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: DB_USER
        - name: DB_PASS
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: DB_PASS
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 3
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: jobpulse-api-svc
  namespace: jobpulse
spec:
  type: NodePort
  selector:
    app: jobpulse-api
  ports:
  - port: 5000
    targetPort: 5000
    nodePort: 30500

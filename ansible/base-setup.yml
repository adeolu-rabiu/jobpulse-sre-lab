---
- name: JobPulse base node configuration
  hosts: all_nodes
  become: yes
  gather_facts: yes

  vars:
    required_packages:
      - curl
      - wget
      - git
      - vim
      - net-tools
      - htop
      - tmux
      - ufw
      - fail2ban
      - python3
      - python3-pip
    timezone: Europe/London

  tasks:

    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Ensure required packages are installed
      apt:
        name: "{{ required_packages }}"
        state: present

    - name: Set timezone to Europe/London
      timezone:
        name: "{{ timezone }}"

    - name: Ensure UFW is installed
      apt:
        name: ufw
        state: present

    - name: Set UFW default incoming policy to deny
      ufw:
        direction: incoming
        policy: deny

    - name: Set UFW default outgoing policy to allow
      ufw:
        direction: outgoing
        policy: allow

    - name: Allow SSH through UFW
      ufw:
        rule: allow
        port: '22'
        proto: tcp

    - name: Enable UFW
      ufw:
        state: enabled

    - name: Ensure fail2ban is running and enabled
      service:
        name: fail2ban
        state: started
        enabled: yes

    - name: Set hostname from inventory
      hostname:
        name: "{{ inventory_hostname }}"

    - name: Ensure /etc/hosts has all cluster nodes
      lineinfile:
        path: /etc/hosts
        line: "{{ item }}"
        state: present
      loop:
        - "192.168.1.104 jobpulse-k8s-master"
        - "192.168.1.113 jobpulse-k8s-worker"
        - "192.168.1.114 jobpulse-monitoring"
        - "192.168.1.115 jobpulse-cicd"

    - name: Ensure passwordless sudo for agzo
      copy:
        dest: /etc/sudoers.d/agzo
        content: "agzo ALL=(ALL) NOPASSWD:ALL\n"
        mode: '0440'
        validate: /usr/sbin/visudo -cf %s

    - name: Print node summary
      debug:
        msg: >
          Node: {{ inventory_hostname }}
          OS: {{ ansible_distribution }} {{ ansible_distribution_version }}
          IP: {{ ansible_default_ipv4.address }}
          CPU cores: {{ ansible_processor_vcpus }}
          RAM: {{ (ansible_memtotal_mb / 1024) | round(1) }} GB
